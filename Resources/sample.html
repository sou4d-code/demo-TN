<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Registration</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 480px; margin: 30px auto; padding: 0 20px; }
    h1 { font-size: 22px; margin-bottom: 20px; color: #2C3E50; }
    fieldset { border: 1px solid #ccc; border-radius: 4px; padding: 14px 16px; margin-bottom: 16px; }
    legend { font-weight: bold; padding: 0 6px; }
    label { display: inline-block; width: 130px; font-size: 13px; }
    input[type="text"], input[type="email"], select, textarea {
      width: 240px; padding: 4px 8px; font-size: 13px; margin-bottom: 10px; box-sizing: border-box;
    }
    textarea { height: 70px; resize: vertical; }
    input[type="checkbox"] { margin-right: 6px; }
    .row { margin-bottom: 8px; }
    .actions { text-align: right; margin-top: 12px; }
    button { padding: 8px 22px; font-size: 13px; cursor: pointer; }
    button.primary { background: #2C3E50; color: #fff; border: none; border-radius: 4px; }
    button.secondary { background: #ECF0F1; border: 1px solid #bbb; border-radius: 4px; }
  </style>
</head>
<body>

<h1>Employee Registration</h1>

<fieldset>
  <legend>Personal Information</legend>
  <div class="row">
    <label for="firstName">First Name:</label>
    <input type="text" id="firstName" name="firstName" placeholder="John">
  </div>
  <div class="row">
    <label for="lastName">Last Name:</label>
    <input type="text" id="lastName" name="lastName" placeholder="Doe">
  </div>
  <div class="row">
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="john@example.com">
  </div>
  <div class="row">
    <label for="birthDate">Birth Date:</label>
    <input type="text" id="birthDate" name="birthDate" placeholder="YYYY-MM-DD">
  </div>
</fieldset>

<fieldset>
  <legend>Employment Details</legend>
  <div class="row">
    <label for="department">Department:</label>
    <select id="department" name="department">
      <option value="">Select...</option>
      <option value="eng">Engineering</option>
      <option value="mkt">Marketing</option>
      <option value="hr">Human Resources</option>
      <option value="fin">Finance</option>
    </select>
  </div>
  <div class="row">
    <label for="role">Role / Title:</label>
    <input type="text" id="role" name="role" placeholder="Software Engineer">
  </div>
  <div class="row">
    <label for="startDate">Start Date:</label>
    <input type="text" id="startDate" name="startDate" placeholder="YYYY-MM-DD">
  </div>
  <div class="row">
    <label>
      <input type="checkbox" id="isFullTime" name="isFullTime"> Full-time employee
    </label>
  </div>
</fieldset>

<fieldset>
  <legend>Notes</legend>
  <div class="row">
    <label for="notes">Additional Notes:</label><br>
    <textarea id="notes" name="notes" placeholder="Any additional information…" style="width:100%;"></textarea>
  </div>
</fieldset>

<div class="actions">
  <button class="secondary" type="button" id="btnCancel">Cancel</button>
  &nbsp;
  <button class="primary" type="button" id="btnSubmit">Register Employee</button>
</div>

</body>
</html>
